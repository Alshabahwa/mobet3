<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MO BET</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">

<style>
.scan-circle{
width:180px;
height:180px;
margin:30px auto;
border-radius:50%;
border:2px dashed rgba(0,220,255,.25);
display:flex;
justify-content:center;
align-items:center;
animation:spin 8s linear infinite;
}

.scan-inner{
width:90px;
height:90px;
border-radius:50%;
border:2px solid #b84cff;
box-shadow:
0 0 20px #b84cff,
0 0 40px #00d9ff;
}

.standby-text{
margin-top:15px;
font-size:24px;
letter-spacing:4px;
}

.standby-sub{
margin-top:10px;
font-size:12px;
color:#2ee8ff;
letter-spacing:2px;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{
background:
radial-gradient(circle at top right,#3f1b73 0%,#0a1033 40%,#040817 100%);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
color:white;
}

.panel{
width:100%;
max-width:420px;
background:rgba(10,15,50,.85);
border:1px solid rgba(130,120,255,.25);
border-radius:35px;
padding:30px;
backdrop-filter:blur(12px);
box-shadow:
0 0 20px rgba(120,90,255,.3),
0 0 60px rgba(50,150,255,.15);
}

.logo{
width:90px;
height:90px;
margin:auto;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
border:2px solid #6e7cff;
box-shadow:0 0 20px #6e7cff;
font-size:40px;
}

.title{
margin-top:20px;
text-align:center;
font-size:42px;
font-weight:700;
letter-spacing:6px;
background:linear-gradient(90deg,#36b8ff,#d54cff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
text-align:center;
margin-top:10px;
color:#b7bddf;
letter-spacing:5px;
font-size:12px;
}

.label{
margin-top:30px;
margin-bottom:10px;
font-size:13px;
letter-spacing:4px;
color:#d7dcff;
}

.input{
width:100%;
padding:20px;
background:rgba(255,255,255,.03);
border:1px solid rgba(255,255,255,.08);
border-radius:20px;
color:white;
font-size:18px;
outline:none;
}

.input::placeholder{
color:#6f78a5;
}

.btn{
width:100%;
margin-top:25px;
padding:22px;
border:none;
border-radius:22px;
cursor:pointer;
font-size:18px;
font-weight:700;
letter-spacing:4px;
color:white;
background:linear-gradient(90deg,#329dff,#cb4cff);
box-shadow:
0 0 20px rgba(109,118,255,.5),
0 0 40px rgba(203,76,255,.4);
}

.info{
margin-top:25px;
padding:20px;
border-radius:25px;
background:rgba(255,255,255,.02);
border:1px solid rgba(255,255,255,.05);
}

.row{
display:flex;
justify-content:space-between;
margin:15px 0;
}

.telegram{
margin-top:15px;
padding:15px;
border-radius:15px;
border:1px solid rgba(203,76,255,.4);
background:rgba(120,0,255,.08);
color:#2ee8ff;
text-align:center;
}

#dashboard{
display:none;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.exit{
padding:12px 22px;
background:transparent;
border:1px solid rgba(255,255,255,.15);
border-radius:18px;
color:white;
cursor:pointer;
}

.cards{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.card{
padding:20px;
border-radius:25px;
background:rgba(255,255,255,.03);
border:1px solid rgba(255,255,255,.08);
}

.card h5{
font-size:12px;
letter-spacing:3px;
color:#8fa5ff;
margin-bottom:10px;
}

.card span{
font-size:20px;
font-weight:700;
}

.engine{
margin-top:25px;
padding:25px;
border-radius:30px;
background:
linear-gradient(180deg,
rgba(88,40,150,.45),
rgba(5,15,50,.8));
border:1px solid rgba(140,120,255,.2);
text-align:center;
}

.engine-title{
color:#27d7ff;
font-size:12px;
letter-spacing:5px;
}

.result{
margin-top:40px;
font-size:72px;
font-weight:700;
line-height:1;
background:linear-gradient(#ff59ff,#af39ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
display:none;
}

.confidence{
margin-top:20px;
color:#2fe6ff;
letter-spacing:4px;
display:none;
}

.generate{
margin-top:20px;
padding:20px;
width:100%;
border-radius:22px;
border:1px solid rgba(188,72,255,.4);
background:transparent;
color:white;
font-size:18px;
cursor:pointer;
}


.matrix-grid{
margin-top:25px;
display:grid;
grid-template-columns:repeat(5,1fr);
gap:12px;
}
.cell{
height:60px;
border-radius:16px;
border:1px solid rgba(255,255,255,.08);
background:rgba(255,255,255,.03);
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
}
.cell.safe{
border:1px solid #cb4cff;
box-shadow:0 0 15px rgba(203,76,255,.5);
background:rgba(203,76,255,.15);
}

</style>
</head>

<body>

<div class="panel">

<!-- LOGIN -->

<div id="login">

<div class="logo">⬢</div>

<div class="title">MO BET</div>

<div class="subtitle">
SECURE ACCESS CONSOLE
</div>

<div class="label">
OPERATOR ID
</div>

<input
id="operatorId"
class="input"
placeholder="e.g. 1234567890">

<div class="label">
ACCESS KEY
</div>

<input
id="password"
type="password"
class="input"
placeholder="••••••">

<button class="btn" onclick="login()">
AUTHENTICATE
</button>

<div class="info">

<div class="row">
<span>PROMO CODE</span>
<span>AL331</span>
</div>

<div class="row">
<span>PLATFORM</span>
<span>1xBet</span>
</div>

<div class="telegram">
https://t.me/MOBET888
</div>

</div>

</div>


<!-- DASHBOARD -->

<div id="dashboard">

<div class="topbar">
<div>
<h2>MOBET VIP</h2>
<div id="user"></div>
</div>

<button class="exit" onclick="logout()">EXIT</button>
</div>

<div class="cards">
<div class="card"><h5>ROWS</h5><span>5</span></div>
<div class="card"><h5>COLS</h5><span>5</span></div>
<div class="card"><h5>SAFE</h5><span>5</span></div>
<div class="card"><h5>STATUS</h5><span>ONLINE</span></div>
</div>

<div class="engine">
<div class="engine-title">MOBET VIP</div>

<div class="matrix-grid" id="matrixGrid">
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>

<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
</div>

<button class="btn" onclick="revealAll()">REVEAL ALL</button>
<button class="generate" onclick="newSeed()">NEW SEED</button>

</div>
</div>

<script>

function login(){

const id =
document.getElementById('operatorId').value.trim();

const pass =
document.getElementById('password').value.trim();

if(!/^[0-9]{9,10}$/.test(id)){
alert('ID must contain 9-10 digits');
return;
}

if(pass !== 'AL331'){
alert('Wrong Access Key');
return;
}

document.getElementById('login').style.display='none';
document.getElementById('dashboard').style.display='block';

document.getElementById('user').innerHTML =
'Operator ID : '+id;

}

function logout(){

document.getElementById('dashboard').style.display='none';
document.getElementById('login').style.display='block';

document.getElementById('resultBox').style.display='none';
document.getElementById('standby').style.display='block';

}


function revealAll(){
const cells=document.querySelectorAll('.cell');

newSeed();

for(let row=0; row<5; row++){

let diamond=Math.floor(Math.random()*5);

for(let col=0; col<5; col++){

let index=(row*5)+col;

if(col===diamond){
cells[index].innerHTML='🍎';
cells[index].classList.add('safe');
}else{
cells[index].innerHTML='';
cells[index].classList.remove('safe');
}

}

}

}

function newSeed(){
document.querySelectorAll('.cell').forEach(c=>{
c.innerHTML='';
c.classList.remove('safe');
});
}
</script>

</body>
</html>
